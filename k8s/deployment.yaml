apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-hello
  template:
    metadata:
      labels:
        app: spring-hello
    spec:
      containers:
      - name: spring-container
        image: hello-spring:0.0.1
        imagePullPolicy: Never # Critical: Tells K8s to use the local image you just built
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service
spec:
  type: NodePort
  selector:
    app: spring-hello
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001