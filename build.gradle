plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.johnsonstuff'
// @todo: Move to using gradle release plugsin and remove manual -SNAPSHOT suffix 
//version = '0.0.1-SNAPSHOT'
version = '0.1.0'

java {
	toolchain {
		// JDK26 has container issues right and left, no time to debug
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
        // This contains JUnit 5 (Jupiter), Assertions, and the Test Engine
        testImplementation 'org.springframework.boot:spring-boot-starter-test'	
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-test-autoconfigure'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
