# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Top-level permissions apply to all jobs in this file
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GitHub Container Registry (GHCR)

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'


    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # NOTE: The Gradle Wrapper is the default and recommended way to run Gradle (https://docs.gradle.org/current/userguide/gradle_wrapper.html).
    # If your project does not have the Gradle Wrapper configured, you can use the following configuration to run Gradle with a specified version.
    #
    # - name: Setup Gradle
    #   uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    #   with:
    #     gradle-version: '8.9'
    #
    # - name: Build with Gradle 8.9
    #   run: gradle build


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    #- name: Build and push
    #  run: |
    #    docker build -t ghcr.io/${{ github.actor }}/basiccontainer:latest .
    #    docker push ghcr.io/${{ github.actor }}/basiccontainer:latest

    # Use the first 7 characters of the commit SHA as a unique tag
    # This creates a unique tag for each commit, which is a good practice for versioning container images in CI/CD pipelines.
    # ...however, it also creates a "multi-check-in procedure"
    #    TAG=$(echo ${{ github.sha }} | cut -c1-7)
    # @TODO: FIX This to use better tagging strategy (e.g., GitHub Actions "GITHUB_RUN_NUMBER" or "GITHUB_REF_NAME" for branch-based tagging)
    - name: Build and push
      run: |
        TAG="004"  # For simplicity, using a static tag here. In production, consider using dynamic tags (e.g., Git SHA or version numbers).
        IMAGE_NAME=ghcr.io/${{ github.actor }}/basiccontainer
        docker build -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:latest .
        docker push $IMAGE_NAME:$TAG
        docker push $IMAGE_NAME:latest
        
    #- name: Login to GitHub Container Registry
    #  uses: docker/login-action@v3
    #  with:
    #    registry: ghcr.io
    #    username: ${{ github.actor }}
    #    password: ${{ secrets.GITHUB_TOKEN }}

    #- name: Build and push
    #  uses: docker/build-push-action@v5
    #  with:
    #    context: .
    #    push: true
    #    # This tags it as 'latest' and also uses the Git SHA for versioning (Good DevOps practice)
    #    tags: |
    #      ghcr.io/phil-2026/basiccontainer:latest
    #      ghcr.io/phil-2026/basiccontainer:${{ github.sha }}    

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
